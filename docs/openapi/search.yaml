      summary: Terminal query-unit rows
      description: Returns terminal row results for explicit ``messages/actions/blocks/assertions/files/runs/observed-events/context-snapshots
        where ...`` expressions. This endpoint shares the query-unit row and aggregate envelope contracts with CLI JSON output,
        MCP ``query_units``, and ``Polylogue.query_units()``.
      operationId: queryUnits
      parameters:
      - name: expression
        in: query
        description: 'Explicit unit-source expression. Examples: ``messages where session.repo:polylogue AND role:assistant
          AND text:timeout``; ``actions where session.repo:polylogue AND tool:bash AND text:pytest``; ``blocks where session.origin:codex-session
          AND type:code AND text:timeout``; ``assertions where kind:decision AND status:active AND text:review``; ``files
          where session.repo:polylogue AND action:file_edit AND path:archive/query``; ``runs where session.repo:polylogue
          AND role:main``; ``observed-events where kind:tool_finished AND status:failed | group by tool | count``; ``context-snapshots
          where boundary:session_start``.'
        required: true
        schema:
