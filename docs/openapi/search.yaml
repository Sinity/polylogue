    SessionSearchMatchPayload:
      additionalProperties: false
      description: "Evidence explaining why a session appeared in search results.\n\n``score_kind`` describes the meaning\
        \ of ``score`` so consumers don't\nhave to guess at ordering or comparability:\n\n- ``\"bm25\"`` — SQLite FTS5 raw\
        \ BM25 (lower magnitude = better match;\n  values typically negative; never comparable across queries).\n- ``\"rrf\"\
        `` — Reciprocal Rank Fusion (higher = stronger consensus;\n  ``score_components`` carries per-lane ``*_rank`` and\
