  /api/sessions/{session_id}/read:
    get:
      summary: Execute a session read-view
      description: Executes one supported single-session read profile and returns the stable ``SessionReadViewEnvelope``.
        Supported profiles currently include ``messages``, ``raw``, ``context``, ``context-image``, ``neighbors``, ``correlation``.
        The envelope shape is stable; individual ``payload`` content is the shared DTO for the selected read profile.
      operationId: readSessionView
      parameters:
      - name: session_id
        in: path
        description: Resolved Polylogue session id.
        required: true
        schema:
          type: string
      - name: view
        in: query
        description: Read-view id from /api/read-view-profiles.
        required: false
        schema:
          type: string
          enum:
          - messages
          - raw
          - context
          - context-image
          - neighbors
          - correlation
          default: messages
      - name: format
        in: query
        description: Output format accepted by the selected read view.
        required: false
        schema:
          type: string
          enum:
          - json
          default: json
      - name: limit
        in: query
        required: false
        description: Messages/neighbor page size where applicable.
        schema:
          type: integer
          minimum: 1
      - name: offset
        in: query
        required: false
        description: Message offset for the messages view.
        schema:
          type: integer
          minimum: 0
      - name: related_limit
        in: query
        required: false
        description: Number of related sessions to include in the context view.
        schema:
          type: integer
          minimum: 1
          default: 5
      - name: include_messages
        in: query
        required: false
        description: Include message excerpts in context-image payloads.
        schema:
          type: boolean
          default: true
      - name: max_tokens
        in: query
        required: false
        description: Token budget for the compiled context image; over-budget segments are omitted.
        schema:
          type: integer
          minimum: 1
      - name: no_redact
        in: query
        required: false
        description: Return unredacted context-image path/provenance details where available.
        schema:
          type: boolean
          default: false
      - name: window_hours
        in: query
        required: false
        description: Neighbor discovery window in hours.
        schema:
          type: integer
          minimum: 1
          default: 24
      - name: confidence_threshold
        in: query
        required: false
        description: Minimum confidence for correlation evidence.
        schema:
          type: number
          minimum: 0
          maximum: 1
          default: 0.3
      - name: repo_path
        in: query
        required: false
        description: Repository path for correlation evidence.
        schema:
          type: string
      - name: since_hours
        in: query
        required: false
        description: Correlation scan window on each side of the session.
        schema:
          type: integer
          minimum: 1
          default: 2
      responses:
        '200':
          description: Executed read-view envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionReadViewEnvelope'
        '400':
          description: Unsupported view or format.
        '404':
          description: Session not found.
  /api/assertions:
    get:
      summary: List assertion-backed overlay claims
      description: Returns assertion claims through the stable ``AssertionClaimListPayload`` shared by the web workbench,
        Python API, and MCP assertion-read surface. Defaults to active and candidate claims; use ``status=all`` for an explicit
        full lifecycle read.
      operationId: listAssertionClaims
      parameters:
      - name: target_ref
        in: query
        description: Optional target object ref, such as ``session:<id>``.
        required: false
        schema:
          type: string
      - name: scope_ref
        in: query
        description: Optional assertion scope object ref, such as ``repo:polylogue``.
        required: false
        schema:
          type: string
      - name: kind
        in: query
        description: Assertion kind filter. May be repeated or comma-separated.
        required: false
        schema:
          type: string
      - name: status
        in: query
        description: Lifecycle status filter. Defaults to active,candidate; ``all`` includes every persisted status.
        required: false
        schema:
          type: string
      - name: context_inject
        in: query
        description: Restrict by assertion context_policy.inject.
        required: false
        schema:
          type: boolean
      - name: limit
        in: query
        description: Maximum claims returned.
        required: false
        schema:
          type: integer
          minimum: 1
          default: 50
      responses:
        '200':
          description: Assertion claim list envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AssertionClaimListPayload'
