info:
  title: Polylogue Search API
  version: '1'
  description: Local daemon HTTP API exposing typed query envelopes shared across CLI JSON, MCP, and the Python API. This
    document is generated from Pydantic models in `polylogue.surfaces.payloads`; do not edit by hand. Run `devtools render
    openapi` to regenerate.
servers:
- url: http://127.0.0.1:{port}
  description: Local Polylogue daemon (loopback only).
  variables:
    port:
      default: '8765'
      description: Daemon HTTP port; see `polylogued status`.
paths:
  /api/sessions:
    get:
      summary: Ranked session search and list
      description: When ``query`` is supplied, returns a ranked search envelope (``SearchEnvelope``) with per-hit match evidence
        and pagination handles. When ``query`` is omitted, returns the session list envelope. Both envelopes carry ``total``,
        ``limit``, ``offset``, and ``next_cursor`` for cursor-based pagination.
      operationId: searchSessions
      parameters:
      - name: query
        in: query
        description: FTS5 search query string.
        required: false
        schema:
          type: string
      - name: limit
        in: query
        description: Page size (default 50).
        required: false
        schema:
          type: integer
          minimum: 1
          default: 50
      - name: offset
        in: query
        description: Row offset. Best-effort for ranked search; use ``next_cursor`` for stable pagination.
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
      - name: provider
        in: query
        description: Provider name filter.
        required: false
        schema:
          type: string
      - name: since
        in: query
        description: ISO 8601 lower bound on session date.
        required: false
        schema:
          type: string
          format: date-time
      - name: retrieval_lane
        in: query
        description: 'Retrieval lane: ``auto``, ``dialogue``, ``actions``, ``hybrid``, ``semantic``.'
        required: false
        schema:
          type: string
          enum:
          - auto
          - dialogue
          - actions
          - hybrid
          - semantic
          default: auto
      - name: cursor
        in: query
        description: Opaque keyset cursor previously returned as ``next_cursor`` on a search response. Stable across archive
          growth and daemon restart (#1268). MUST be passed back unchanged. Rejected with 400 when malformed or when the retrieval
          lane no longer matches.
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Ranked search envelope (when ``query`` is supplied) or session list envelope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchEnvelope'
  /api/query-units:
