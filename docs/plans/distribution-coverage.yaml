# Distribution-coverage manifest.
#
# Documents the current state of install-artifact parity across
# wheel, sdist, Nix package, and OCI container. The local distribution
# gate now builds wheel/sdist artifacts, rebuilds from unpacked sdist
# without .git, smokes installed runtime entrypoints, and is wired into
# CI (.github/workflows/ci.yml::distribution). PyPI Trusted Publishing
# and GHCR container push run from .github/workflows/release.yml on
# `vX.Y.Z` tag push.
#
# Updated 2026-05-17 for #953 — broad-distribution packaging.

description: >
  Wheel/sdist/Nix install parity for polylogue. Documents build
  configuration, verification gates, and known gaps for each
  artifact type.

artifacts:
  wheel:
    description: Python wheel distribution (bdist_wheel)
    build_system: hatchling
    config_location: pyproject.toml
    build_command: devtools release verify-distribution
    install_command: pip install polylogue
    verification_command: devtools release verify-distribution
    ci_build: true
    ci_test: true
    notes: >
      pyproject.toml uses [build-system] with hatchling.
      The distribution gate (ci.yml::distribution) builds wheel +
      sdist, installs each in a fresh venv, and smokes polylogue,
      polylogued, polylogue-mcp, and python -m polylogue. Tagged
      releases publish to PyPI via OIDC Trusted Publishing
      (release.yml::publish-pypi).

  sdist:
    description: Python source distribution (sdist)
    build_system: hatchling
    config_location: pyproject.toml
    build_command: devtools release verify-distribution
    install_command: pip install polylogue
    verification_command: devtools release verify-distribution
    ci_build: true
    ci_test: true
    notes: >
      Source distribution embeds polylogue/_build_info.py. The
      distribution gate unpacks the sdist outside .git, rebuilds
      a wheel from it, installs that wheel, and runs the same
      runtime smoke surface (ci.yml::distribution). Tagged releases
      publish to PyPI via OIDC Trusted Publishing.

  nix_package:
    description: Nix flake package derivation
    build_system: nix flake
    config_location: flake.nix
    build_command: nix build
    install_command: nix profile install
    ci_build: true
    ci_test: true
    notes: >
      Nix flake check runs in CI (nix-build gate). nix flake
      check validates the derivation can build. Nix is the
      primary distribution mechanism for the project author.
      Python version is managed by Nix, not pip. The flake exposes
      apps.{polylogue,polylogued,polylogue-mcp} for `nix run
      github:Sinity/polylogue#<app>`, a NixOS module
      (nixosModules.default) wiring services.polylogue, and a Home
      Manager module (homeManagerModules.default) wiring
      programs.polylogued. The cachix workflow
      (.github/workflows/cachix.yml) pushes the package + devshell
      closures to the polylogue cachix cache on master pushes and
      tags; the flakehub workflow (.github/workflows/flakehub.yml)
      publishes the flake to FlakeHub on tag push.

  dev_install:
    description: Editable development install
    build_system: hatchling (pip install -e .)
    config_location: pyproject.toml
    build_command: pip install -e .
    install_command: pip install -e .
    ci_build: false
    ci_test: false
    notes: >
      Development install via pip install -e . (hatchling).
      Used locally but not verified in CI. The devshell
      (nix develop) is the canonical dev environment.

  oci_container:
    description: OCI image with polylogue / polylogued / polylogue-mcp on PATH
    build_system: Containerfile (multi-stage, uv wheel build + slim runtime)
    config_location: Containerfile
    build_command: docker buildx build -f Containerfile .
    install_command: podman pull ghcr.io/sinity/polylogue:latest
    ci_build: false
    ci_test: false
    notes: >
      Builder stage uses `uv build --wheel`; runtime stage installs the
      wheel into python:3.13-slim-bookworm under a non-root user with
      tini as PID 1. Volumes /data (XDG_DATA_HOME) and /config
      (XDG_CONFIG_HOME) are declared. Build + push to GHCR runs from
      release.yml::publish-container on `vX.Y.Z` tag push. Pre-tag CI
      does not build the image to keep ci.yml fast; the
      release verify-distribution gate exercises the same wheel that
      the Containerfile installs.

  browser_extension:
    description: Manifest V3 browser extension (Chrome .zip + Firefox .xpi)
    build_system: node scripts/build.mjs (pure-JS, zip(1) or python zipfile fallback)
    config_location: browser-extension/manifest.json + browser-extension/scripts/build.mjs
    build_command: npm run build
    install_command: chrome://extensions Load unpacked / about:debugging Load Temporary
    verification_command: npm run validate
    ci_build: true
    ci_test: true
    notes: >
      Packed Chrome .zip and Firefox .xpi attached to GitHub Releases by
      .github/workflows/extension-release.yml on vX.Y.Z tag push. The
      build script reads the canonical project version from the [project]
      table of pyproject.toml and rewrites browser-extension/manifest.json
      + package.json to match before packaging. Firefox manifest is a
      generated variant with browser_specific_settings.gecko populated.
      web-ext lint runs against the unpacked Firefox bundle as a CI gate.
      Playwright captures store-submission screenshots at the Chrome Web
      Store and AMO required aspect ratios. Store submission itself
      (Chrome Web Store + Mozilla AMO) is tracked separately under
      coverage_gaps.browser-extension-store.

  devshell:
    description: Nix development shell
    build_system: nix flake (devShells.default)
    config_location: flake.nix
    build_command: nix develop
    ci_present: true
    notes: >
      Primary development environment. Enters automatically
      via direnv. Installs all dependencies and git hooks.
      Verified by nix flake check in CI.

  devtools:
    description: Source-checkout repository control plane
    build_system: source checkout / Nix devshell wrapper
    config_location: flake.nix
    install_command: nix develop
    ci_present: true
    notes: >
      Devtools are intentionally source-checkout-only. They are
      exposed in the devshell by the devtools wrapper in flake.nix.

  pip_dependencies:
    count: null
    resolved_by: flake.nix (overrides pyproject.toml)

  platform_coverage:
    linux: ci_test
    macos: false
    windows: false
    notes: >
      CI tests on Linux only (3 Python versions: 3.11, 3.12,
      3.13). No macOS or Windows runners.

coverage_gaps:
  - id: distribution.dev-install-ci
    artifact: dev_install
    gap: Not verified in CI; devshell is canonical environment
    owner: distribution
    severity: minor
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    issue: 593
    next_evidence: devtools release verify-distribution
  - id: distribution.macos-ci
    platform: macos
    gap: No macOS CI runner
    owner: distribution
    severity: minor
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    issue: 593
    next_evidence: devtools release verify-distribution
  - id: distribution.windows-ci
    platform: windows
    gap: No Windows CI runner
    owner: distribution
    severity: minor
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    issue: 593
    next_evidence: devtools release verify-distribution
  - id: distribution.nix-wheel-parity
    concern: install_parity
    gap: Local gate smokes wheel and sdist-built wheel, but exact Nix/devshell parity is not yet compared in CI
    owner: distribution
    severity: major
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    issue: 593
    next_evidence: devtools release verify-distribution
  - id: distribution.container-ci-build
    artifact: oci_container
    gap: Containerfile is built+pushed only on tag (release.yml). No pre-tag CI build means image-only regressions surface at release time.
    owner: distribution
    severity: minor
    declared_at: "2026-05-17"
    review_after: "2026-08-01"
    issue: 953
    next_evidence: devtools release verify-distribution
  - id: distribution.browser-extension-store
    artifact: browser_extension
    gap: Packed .zip/.xpi ship on GitHub releases (#1238), but Chrome Web Store / Mozilla AMO submission still requires non-engineering store sign-up + review.
    owner: distribution
    severity: minor
    declared_at: "2026-05-17"
    review_after: "2026-08-01"
    issue: 953
    next_evidence: devtools release verify-distribution
