# Inter-package layering rules.
#
# Each rule declares forbidden imports for a package ring. The current
# enforced baseline is intentionally the no-backward-import contract: substrate
# rings must not reach into insight/lab/surface adapters. Aspirational surface
# slimming belongs in coverage manifests until call sites are moved.
#
# Semantics:
#   - "disallow" means the import is always forbidden
#   - "allow" with an empty or absent from list means all sources are allowed
#   - "allow" with a from list restricts imports to those packages only
#   - writer modules declare their owned surfaces in the module docstring as
#     "Writer module: <tier>[, <tier>]". The policy is the audited inventory.
#   - durability/interruption pairs are deliberately distinct: durable writes
#     are atomic, rebuildable writes are replayable, and ops writes restart.
#   - a module may own multiple tiers only through a named twin-write contract.

writer_modules:
  marker: "Writer module:"
  # This boundary inventories tier-owning archive facade modules. Lower-level
  # query helpers execute on caller-supplied connections and do not own tiers.
  mutation_roots: [polylogue/storage/sqlite/archive_tiers]
  modules:
    - path: polylogue/storage/sqlite/archive_tiers/archive.py
      surfaces:
        - tier: index
          durability: rebuildable
          interruption: replayable
        - tier: source
          durability: durable
          interruption: atomic
      entrypoints:
        [apply_raw_membership_classification, apply_raw_revision_replay, classify_raw_revision_cohort,
        delete_sessions, release_provisional_full_revisions, replace_raw_membership_census,
        write_parsed_for_retained_raw, write_parsed_for_retained_raw_result, write_raw_and_parsed,
        write_raw_and_parsed_result, write_raw_blob_and_parsed, write_raw_blob_and_parsed_result]
      twin_write_contract: raw-membership-classification
    - path: polylogue/storage/sqlite/archive_tiers/revision_application.py
      surfaces:
        - tier: index
          durability: rebuildable
          interruption: replayable
      entrypoints: [record_revision_application_sync]
    - path: polylogue/storage/sqlite/archive_tiers/source_write.py
      surfaces:
        - tier: source
          durability: durable
          interruption: atomic
      entrypoints:
        [apply_source_raw_state_update, bind_source_raw_revision, record_excised_blob_hash, write_history_sidecar,
        write_source_blob_refs, write_source_raw_session, write_source_raw_session_blob_ref]
    - path: polylogue/storage/sqlite/archive_tiers/write.py
      surfaces:
        - tier: index
          durability: rebuildable
          interruption: replayable
      entrypoints:
        [apply_insight_materialization, rebuild_archive_messages_fts, repair_stale_prefix_branch_points,
        replace_parser_ingest_flag_tags, upsert_insight_materialization, upsert_parser_ingest_flag_tags,
        upsert_session_profile_costs, write_parsed_session_to_archive]
    - path: polylogue/storage/sqlite/archive_tiers/session_annotations_write.py
      surfaces:
        - tier: index
          durability: rebuildable
          interruption: replayable
        - tier: user
          durability: durable
          interruption: atomic
      entrypoints:
        [upsert_session_phase, upsert_session_tag, upsert_session_work_event]
      twin_write_contract: session-tag-assertion-mirror
    - path: polylogue/storage/sqlite/archive_tiers/embedding_write.py
      surfaces:
        - tier: embeddings
          durability: rebuildable
          interruption: replayable
      entrypoints:
        [begin_embedding_attempt, complete_embedding_attempt_success, mark_session_embedding_error,
        record_embedding_failure, resolve_embedding_failure, resolve_open_embedding_failures_for_session,
        supersede_embedding_attempt, upsert_message_embedding, upsert_message_embeddings]
    - path: polylogue/storage/sqlite/archive_tiers/user_write.py
      surfaces:
        - tier: user
          durability: durable
          interruption: atomic
      entrypoints:
        [judge_assertion_candidate, judge_assertion_candidates, mark_assertion_status, upsert_annotation, upsert_assertion,
        upsert_blackboard_note, upsert_comparative_judgment_assertion, upsert_correction, upsert_mark,
        upsert_pathology_findings_as_assertions,
        upsert_recall_pack, upsert_saved_view, upsert_session_metadata_assertion, upsert_session_tag_assertion,
        upsert_suppression, upsert_transform_candidate_assertions, upsert_findings_as_assertions, upsert_workspace]
    - path: polylogue/storage/sqlite/archive_tiers/user_annotations.py
      surfaces:
        - tier: user
          durability: durable
          interruption: atomic
      entrypoints: [persist_annotation_batch, persist_annotation_schema, persist_builtin_annotation_schemas]
    - path: polylogue/storage/sqlite/archive_tiers/context_delivery_write.py
      surfaces:
        - tier: user
          durability: durable
          interruption: atomic
      entrypoints: [write_context_delivery]
    - path: polylogue/storage/sqlite/archive_tiers/ops_write.py
      surfaces:
        - tier: ops
          durability: disposable
          interruption: restartable
      entrypoints:
        [add_convergence_debt, record_cursor_lag_sample, record_daemon_stage_event, record_ingest_attempt, record_query_run,
        record_daemon_lifecycle_heartbeat, record_daemon_lifecycle_signal, record_daemon_lifecycle_start,
        record_daemon_lifecycle_stop, record_mcp_call, upsert_embedding_catchup_run, upsert_ingest_cursor,
        upsert_otlp_span]
    - path: polylogue/storage/sqlite/archive_tiers/ingest_precedence.py
      surfaces:
        - tier: index
          durability: rebuildable
          interruption: replayable
      entrypoints: [record_capture_gap_event, record_source_outage_events]
    - path: polylogue/storage/sqlite/archive_tiers/pricing_seed.py
      surfaces:
        - tier: index
          durability: rebuildable
          interruption: replayable
      entrypoints: [seed_price_catalog]
  twin_write_contracts:
    - name: raw-membership-classification
      module: polylogue/storage/sqlite/archive_tiers/archive.py
      surfaces: [index, source]
      entrypoints: [apply_raw_membership_classification]
      reason: "Applying a semantic member-head decision persists the derived session row (index) and the per-raw membership/authority decision (source) together so a partial write can never leave one raw id's authority state inconsistent with the session it was or was not accepted into."
    - name: session-tag-assertion-mirror
      module: polylogue/storage/sqlite/archive_tiers/session_annotations_write.py
      surfaces: [index, user]
      entrypoints: [upsert_session_tag]
      reason: "Legacy single-file archives co-locate assertions; a user tag mirrors to its durable assertion only when that table is present."

rules:
  - target: polylogue/cli
    description: "CLI surface adapter — imports substrate/insights as needed; no inward dependency is permitted."

  - target: polylogue/mcp
    description: "MCP surface adapter — imports substrate/insights as needed; no inward dependency is permitted."

  - target: polylogue/api
    description: "API surface — adapter boundary over substrate and insights."

  - target: polylogue/storage
    description: "Storage substrate must not import surface adapters."
    disallow:
      from: [polylogue/cli, polylogue/mcp, polylogue/daemon, polylogue/ui, polylogue/rendering]

  - target: polylogue/pipeline
    description: "Pipeline orchestration must not import interactive surfaces."
    disallow:
      from: [polylogue/cli, polylogue/mcp, polylogue/daemon, polylogue/ui]

  - target: polylogue/sources
    description: "Source acquisition/parsing must not import surface adapters."
    disallow:
      from: [polylogue/cli, polylogue/mcp, polylogue/daemon, polylogue/ui]

  - target: polylogue/insights
    description: "Derived insights must not import daemon/MCP/UI adapters."
    disallow:
      from: [polylogue/daemon, polylogue/mcp, polylogue/ui]

  - target: polylogue/daemon
    description: "Daemon convergence and HTTP/web-reader surface adapter."
