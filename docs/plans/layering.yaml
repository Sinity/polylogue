# Inter-package layering rules.
#
# Each rule declares forbidden imports for a package ring. The current
# enforced baseline is intentionally the no-backward-import contract: substrate
# rings must not reach into product/lab/surface adapters. Aspirational surface
# slimming belongs in coverage manifests until call sites are moved.
#
# Semantics:
#   - "disallow" means the import is always forbidden
#   - "allow" with an empty or absent from list means all sources are allowed
#   - "allow" with a from list restricts imports to those packages only

rules:
  - target: polylogue/cli
    description: "CLI surface adapter — imports substrate/products as needed; no inward dependency is permitted."

  - target: polylogue/mcp
    description: "MCP surface adapter — imports substrate/products as needed; no inward dependency is permitted."

  - target: polylogue/api
    description: "API surface — adapter boundary over substrate and products."

  - target: polylogue/lib
    description: "Shared semantic substrate must not import surface adapters."
    disallow:
      from: [polylogue/cli, polylogue/mcp, polylogue/site, polylogue/ui, polylogue/rendering]

  - target: polylogue/storage
    description: "Storage substrate must not import surface adapters."
    disallow:
      from: [polylogue/cli, polylogue/mcp, polylogue/site, polylogue/ui, polylogue/rendering]

  - target: polylogue/pipeline
    description: "Pipeline orchestration may call publication stages but must not import interactive surfaces."
    disallow:
      from: [polylogue/cli, polylogue/mcp, polylogue/ui]

  - target: polylogue/sources
    description: "Source acquisition/parsing must not import surface adapters."
    disallow:
      from: [polylogue/cli, polylogue/mcp, polylogue/site, polylogue/ui]

  - target: polylogue/products
    description: "Derived products must not import MCP/site/UI adapters."
    disallow:
      from: [polylogue/mcp, polylogue/site, polylogue/ui]

  - target: polylogue/site
    description: "Site publication surface adapter."
