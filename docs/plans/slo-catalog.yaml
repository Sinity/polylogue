# Read-surface SLO catalog.
#
# Each surface declares the read path, the benchmark test that exercises it,
# and the latency budget enforced by `devtools bench slo`. Budgets are
# starting points (#872) calibrated against the synthetic 5k/10k benchmark
# fixtures; they are tightened as evidence accumulates. Tighten by lowering
# p50_ms / p95_ms once a measured surface stays comfortably under budget
# across runs.
#
# Schema (parsed by devtools/verify_slos.py):
#   surfaces:
#     <name>:
#       description:    "human-readable surface description"
#       benchmark_test: "<pytest node id>"
#       p50_ms:         <int milliseconds, median budget>
#       p95_ms:         <int milliseconds, p95 budget — estimated mean+1.645*stddev>
#       gate:           "required" | "informational"
#       tier:           "cheap-local" | "lab"
#
# verify_slos exits non-zero when any required surface (in the active tier set)
# exceeds its declared budget or fails to produce a benchmark result.
# Informational rows are visible but non-blocking placeholders for deferred read
# paths whose benchmark fixtures or product paths do not yet exist.
#
# Tiering separates execution cost:
#   * cheap-local — runnable in `devtools verify` defaults. Small fixtures, low
#     repetition counts, total run under a few seconds. Always enforced.
#   * lab — heavier benchmarks runnable via `devtools verify --lab` or
#     `devtools bench slo --include-lab` (or explicit
#     `devtools bench campaign run <name>`). Skipped in the default loop
#     so commit-frequency verification stays fast.

surfaces:

  query:
    description: "FTS5 search on a common term over the 5k synthetic archive"
    benchmark_test: "tests/benchmarks/test_search_filters.py::test_bench_fts_search_common_term"
    p50_ms: 100
    p95_ms: 250
    gate: "required"
    tier: "cheap-local"

  reader:
    description: "Reader list endpoint over the 5k synthetic archive"
    benchmark_test: "tests/benchmarks/test_reader_api.py::test_bench_reader_list_sessions"
    p50_ms: 300
    p95_ms: 750
    gate: "required"
    tier: "cheap-local"

  facets:
    description: "Facets endpoint aggregating provider/tag counts over the 5k synthetic archive"
    benchmark_test: "tests/benchmarks/test_reader_api.py::test_bench_reader_facets"
    p50_ms: 200
    p95_ms: 500
    gate: "required"
    tier: "cheap-local"

  context:
    description: "Context-image assembly placeholder (deferred until #838 lands)"
    benchmark_test: "tests/benchmarks/test_reader_api.py::test_bench_reader_context_image"
    p50_ms: 500
    p95_ms: 1500
    gate: "informational"
    tier: "cheap-local"

  cost:
    description: "Cost rollup placeholder (deferred until #803/#870 land)"
    benchmark_test: "tests/benchmarks/test_reader_api.py::test_bench_reader_cost_rollup"
    p50_ms: 300
    p95_ms: 800
    gate: "informational"
    tier: "cheap-local"

  daemon_convergence_single_file:
    description: "Daemon ingest convergence for a single 1000-message synthetic session"
    benchmark_test: "tests/benchmarks/test_daemon_convergence.py::test_convergence_single_file_perf"
    p50_ms: 30000
    p95_ms: 60000
    gate: "informational"
    tier: "lab"
