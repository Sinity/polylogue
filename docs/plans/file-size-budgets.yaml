  - path: polylogue/daemon/http.py
    ceiling: 2115
    reason: "daemon HTTP route dispatch + read handlers; added cost-panel endpoint (#1122), provenance endpoint (#1125), topology endpoint (#1121, envelope helpers delegated to daemon/topology_http.py), parent-chain stack + thread-continue templates (#1203, builders delegated to daemon/topology_http.py + daemon/thread_continue.py), insights browser endpoint (#1120), embedding-similarity endpoint (#1123, scoring delegated to daemon/similarity.py), typed maintenance scope-filter parsing (#1196), the typed Operation contract wiring for /api/ingest plus the is_stale provenance helper consumption (#1248/#1322), the paste-browser route + envelope (#1201, span detection delegated to daemon/web_shell_paste.py), the attachment library + per-conversation attachments route (#1199, envelope + library page delegated to daemon/web_shell_attachments.py), the persistent maintenance operation registry status + list routes (#1197, handlers delegated to daemon/maintenance_registry_http.py), and per-method BrokenPipeError suppression wrappers (#1677); events dispatcher delegates to daemon/events_http.py (#957); split candidate: per-domain handler modules under daemon/handlers/"

  - path: polylogue/daemon/web_shell.py
    ceiling: 1550
    reason: "single-page reader shell — CSS, HTML region scaffolding, and JS bootstrap; bulk/workspace/provenance/lineage/similar assets already extracted to daemon/web_shell_bulk.py, daemon/web_shell_workspace.py, daemon/web_shell_provenance.py, daemon/web_shell_lineage.py (#1121), daemon/web_shell_similar.py (#1123); added compare action (#1124), insights browser inspector tab (#1120), similarity inspector tab (#1123), and the topology branch chip + open-chain-as-stack header affordance (#1203); split candidate: extract inspector entry-points into daemon/web_shell_inspector.py"
