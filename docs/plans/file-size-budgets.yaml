# File-size budgets.
#
# Defaults are intentionally moderate. Exceptions are explicit thresholds for
# known large files; they must describe the architectural split that would let
# the ceiling shrink, but they do not point at closed issues.
#
# Updated 2026-04-26 from realized tree.

defaults:
  source_loc_ceiling: 1100
  test_loc_ceiling: 1500

per_package:
  devtools/:
    source_loc_ceiling: 1500
  polylogue/proof/:
    source_loc_ceiling: 1500
  polylogue/pipeline/services/:
    source_loc_ceiling: 1500
  polylogue/operations/:
    source_loc_ceiling: 1100
  polylogue/storage/:
    source_loc_ceiling: 1100
  tests/infra/:
    test_loc_ceiling: 1200

exceptions:
  - path: tests/unit/sources/test_source_laws.py
    ceiling: 2600
    reason: "tracked split into source-walk/parser-dispatch/provider-contracts/laws"

  - path: tests/unit/cli/test_query_exec_laws.py
    ceiling: 2200
    reason: "tracked split into routing/execution/output/stream contracts"

  - path: tests/unit/storage/test_store_ops.py
    ceiling: 2000
    reason: "tracked split into CRUD/FTS/hybrid/insight-persistence contracts"

  - path: tests/unit/sources/test_models.py
    ceiling: 1700
    reason: "tracked split into per-provider model contract suites"

  - path: tests/unit/storage/test_fts5.py
    ceiling: 1650
    reason: "tracked split for FTS escaping vs hybrid ranking"

  - path: tests/unit/sources/test_parsers_base.py
    ceiling: 1400
    reason: "renamed; comment '# MERGED FROM test_parsers.py' indicates pending split"

  - path: tests/unit/mcp/test_tool_contracts.py
    ceiling: 1500
    reason: "tracked split into archive-query vs insight-tool contracts"

  - path: tests/unit/cli/test_query_exec.py
    ceiling: 1300
    reason: "tracked split into routing/execution/output suites"

  - path: polylogue/storage/repair.py
    ceiling: 1300
    reason: "blob orphan/integrity (#818) + message_type backfill (#839); split candidate: lift backfill into pipeline/services"

  - path: polylogue/operations/archive.py
    ceiling: 1300
    reason: "shared operation contracts for ingest/maintenance/mutation/insight aggregation routes (#861, #862, #1134); split candidate: per-domain operation modules under operations/"

  - path: polylogue/daemon/status.py
    ceiling: 1150
    reason: "typed status payloads for failure samples, embedding readiness, tier/notify (#844, #898, #915); split candidate: payload modules per status section"

  - path: tests/unit/sources/test_live_watcher.py
    ceiling: 1600
    reason: "kitchen-sink live-ingest test file (cursor, watcher, batch, debounce, bootstrap); split candidate: per-subject suites under tests/unit/sources/live/"

  - path: polylogue/storage/sqlite/schema_bootstrap.py
    ceiling: 1420
    reason: "schema bootstrap owns reviewed version branches through v14 (#864, #867); split candidate: per-version upgrade modules"

  - path: polylogue/sources/live/batch.py
    ceiling: 1160
    reason: "live ingestion batch processor with metrics, fingerprinting, multi-stage progress tracking, and conversation-scoped convergence dispatch"

  - path: tests/unit/storage/test_backend.py
    ceiling: 1750
    reason: "added FK integrity, quarantine regression, FTS commit-ordering tests (#820/#844/#817)"

  - path: polylogue/daemon/http.py
    ceiling: 1600
    reason: "daemon HTTP route dispatch + read handlers; added cost-panel endpoint (#1122), provenance endpoint (#1125), topology endpoint (#1121, envelope helpers delegated to daemon/topology_http.py), and insights browser endpoint (#1120); events dispatcher delegates to daemon/events_http.py (#957); split candidate: per-domain handler modules under daemon/handlers/"

  - path: polylogue/daemon/web_shell.py
    ceiling: 1460
    reason: "single-page reader shell — CSS, HTML region scaffolding, and JS bootstrap; bulk/workspace/provenance/lineage assets already extracted to daemon/web_shell_bulk.py, daemon/web_shell_workspace.py, daemon/web_shell_provenance.py, daemon/web_shell_lineage.py (#1121); added compare action (#1124) and insights browser inspector tab (#1120); split candidate: extract inspector entry-points into daemon/web_shell_inspector.py"
