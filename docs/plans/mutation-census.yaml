# Mutation census (polylogue-kwsb.2 AC1).
#
# Classifies every destructive/mutating public operation and adapter:
# `executor-routed` (drives OperationExecutor + a MutationActuator),
# `declared-not-routed` (still enforces authorization independently -- named
# Phase 2 debt, not silent absence), or `typed-exemption` (a reviewed reason
# it cannot/should not route through MutationTransaction).
#
# `tests/unit/operations/test_mutation_census.py` enforces:
#   - every row's `operation` exists in `polylogue.operations.specs`'s
#     declared catalog when `spec_name` is set, and its `executor_status`
#     matches this row's `status`.
#   - every row has a `status` in the closed vocabulary above and, for
#     `typed-exemption`, a non-empty `reason`.
#
# Phase 1 (t46.9/kwsb.2) shipped the two named destructive routes (session
# delete/excision, derived identity reset), fully executor-routed on every
# surface that exposes them. Phase 2 adds the `reversible`-class tag,
# metadata, and mark mutation families (role_only-strength executor routes,
# per AC4: reversible writes must not acquire unnecessary interactive
# confirmation). Phase 3 adds the annotation family (reversible, role_only)
# and raw-authority blocker resolution (reset class, confirm_flag --
# discovered mid-session as an unclassified mutating operation, not merely
# an un-migrated one: it had a CLI adapter but no census row at all).
# Every remaining operation below is inventoried honestly as
# `declared-not-routed` -- visible debt for a later phase, not a claim of
# completion.

schema_version: 1

rows:
  # --- Phase 1: executor-routed (t46.9 AC2 named routes) ---------------------
  - operation: mutate-delete-session
    spec_name: mutate-delete-session
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.SessionDeleteActuator
    surfaces: [cli, mcp, api]
    adapters:
      - polylogue.cli.archive_query._emit_delete
      - polylogue.api.archive.PolylogueArchiveMixin.delete_session_safe
      - polylogue.mcp.server_cutover._dispatch_write (operation=delete_session, via delete_session_safe)

  - operation: mutate-session-excision
    spec_name: mutate-session-excision
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.SessionExcisionActuator
    surfaces: [cli]
    adapters:
      - polylogue.cli.commands.excise.excise_command

  - operation: mutate-identity-reset
    spec_name: mutate-identity-reset
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.IdentityResetActuator
    surfaces: [cli]
    adapters:
      - polylogue.cli.commands.reset.reset_command (--session/--source)

  # --- Phase 2: executor-routed (reversible class, role_only confirmation) ---
  - operation: mutate-add-tag
    spec_name: mutate-add-tag
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.TagAddActuator
    surfaces: [facade, mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.add_tag
      - polylogue.mcp.server_cutover._dispatch_write (operation=add_tag, via add_tag)

  - operation: mutate-remove-tag
    spec_name: mutate-remove-tag
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.TagRemoveActuator
    surfaces: [facade, mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.remove_tag
      - polylogue.mcp.server_cutover._dispatch_write (operation=remove_tag, via remove_tag)

  - operation: mutate-bulk-tag-sessions
    spec_name: mutate-bulk-tag-sessions
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.BulkTagActuator
    surfaces: [mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.bulk_tag_sessions
      - polylogue.mcp.server_cutover._dispatch_write (operation=bulk_tag_sessions, via bulk_tag_sessions)

  - operation: mutate-set-metadata
    spec_name: mutate-set-metadata
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.MetadataSetActuator
    surfaces: [facade, mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.set_metadata
      - polylogue.mcp.server_cutover._dispatch_write (operation=set_metadata, via set_metadata)

  - operation: mutate-delete-metadata
    spec_name: mutate-delete-metadata
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.MetadataDeleteActuator
    surfaces: [mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.delete_metadata
      - polylogue.mcp.server_cutover._dispatch_write (operation=delete_metadata, via delete_metadata)

  - operation: mutate-add-mark
    spec_name: mutate-add-mark
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.MarkAddActuator
    surfaces: [mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.add_mark
      - polylogue.mcp.server_cutover._dispatch_write (operation=add_mark, via add_mark)

  - operation: mutate-remove-mark
    spec_name: mutate-remove-mark
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.MarkRemoveActuator
    surfaces: [mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.remove_mark
      - polylogue.mcp.server_cutover._dispatch_write (operation=remove_mark, via remove_mark)

  # --- Phase 3: executor-routed (annotation family; reversible class) --------

  - operation: mutate-save-annotation
    spec_name: mutate-save-annotation
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.AnnotationSaveActuator
    surfaces: [mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.save_annotation
      - polylogue.mcp.server_cutover._dispatch_write (operation=save_annotation, via save_annotation)

  - operation: mutate-delete-annotation
    spec_name: mutate-delete-annotation
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.AnnotationDeleteActuator
    surfaces: [mcp, api]
    adapters:
      - polylogue.api.archive.PolylogueArchiveMixin.delete_annotation
      - polylogue.mcp.server_cutover._dispatch_write (operation=delete_annotation, via delete_annotation)

  # --- Phase 3: executor-routed (raw-authority blocker resolution) -----------
  # Tonight-discovered operator gap (2026-07-21/22): resolve_raw_authority_
  # blocker had a working CLI adapter (raw-authority-blocker-resolve, its own
  # --yes gate) but NO census entry and no authorization path shared with any
  # other destructive route -- an unclassified mutating operation, not merely
  # an un-migrated one. Also added: raw-authority-blockers (read-only list,
  # no census row needed) so an operator can discover an unresolved
  # --blocker-id without page-walking raw-authority-census/-detail or writing
  # an ad hoc script against the live archive.
  - operation: mutate-resolve-raw-authority-blocker
    spec_name: mutate-resolve-raw-authority-blocker
    status: executor-routed
    actuator: polylogue.operations.mutation_actuators.BlockerResolveActuator
    surfaces: [cli]
    adapters:
      - polylogue.cli.commands.maintenance._raw_identity.raw_authority_blocker_resolve_command

  # --- Phase 3 debt: declared-not-routed --------------------------------------
  # MCP-only mutation family with no OperationSpec entry yet (pre-existing
  # gap, not introduced by this PR). jn40's confirm-boolean sweep is the
  # interim mitigation for the destructive members of this family
  # (delete_saved_view, delete_recall_pack, delete_workspace); it does not
  # satisfy executor-routing. add_mark/remove_mark (phase 2) and
  # save_annotation/delete_annotation (phase 3) are executor-routed above;
  # the rest of this family remains Phase 3+ debt.

  - operation: capture_assertion_candidate
    status: declared-not-routed
    surfaces: [mcp]
    reason: Additive candidate capture, not destructive; tracked for completeness.

  - operation: blackboard_post
    status: declared-not-routed
    surfaces: [mcp]
    reason: Additive append-only write, not destructive.

  - operation: import_annotation_batch
    status: declared-not-routed
    surfaces: [mcp]
    reason: Additive batch import with its own provenance/versioning contract.

  - operation: save_saved_view / delete_saved_view
    status: declared-not-routed
    surfaces: [mcp]
    reason: delete_saved_view confirm-gated by jn40; not yet executor-routed.

  - operation: save_recall_pack / delete_recall_pack
    status: declared-not-routed
    surfaces: [mcp]
    reason: delete_recall_pack confirm-gated by jn40; not yet executor-routed.

  - operation: save_workspace / delete_workspace
    status: declared-not-routed
    surfaces: [mcp]
    reason: delete_workspace confirm-gated by jn40; not yet executor-routed.

  - operation: record_correction / clear_corrections
    status: declared-not-routed
    surfaces: [mcp]
    reason: User-correction overlay write; low blast radius (single-target overwrite).

  - operation: rebuild_index / update_index / rebuild_insights (maintenance_execute family)
    status: declared-not-routed
    surfaces: [mcp, daemon]
    reason: >
      jn40 confirm-gated (maintenance_execute/rebuild_index/
      rebuild_session_insights in the named-ten list); internal
      idempotent-rebuild maintenance, not a data-loss operation in the same
      sense as delete/excise/reset. OperationSpec entries
      index-message-fts/materialize-session-insights already declare
      declared-not-routed.

  - operation: ops reset --database/--index/--blob/--assets/--cache/--auth
    status: declared-not-routed
    surfaces: [cli]
    adapters: [polylogue.cli.commands.reset.reset_command]
    reason: >
      Bulk filesystem-tier deletion (whole .db/cache/blob-store files, not
      addressable session/message/block object refs). Already has --yes
      gating and a preview listing; Phase 2 should decide whether to extend
      MutationPlan's target-ref vocabulary to file-tier targets or keep this
      a typed exemption permanently (it is closer to an operator
      infrastructure command than a content mutation).

  # --- Reviewed exemptions -----------------------------------------------------
  - operation: seed-demo-archive
    spec_name: seed-demo-archive
    status: typed-exemption
    surfaces: [cli, tests, validation-lane]
    reason: >
      Test/demo fixture seeding into a disposable demo archive root, not a
      production destructive route; no real user evidence at risk.
