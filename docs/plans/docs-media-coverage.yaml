# Docs-and-media coverage manifest.
#
# Declares the current coverage and freshness policies for
# documentation surfaces and media assets. Seed state: most
# surfaces are not yet under automated freshness verification.
#
# Updated 2026-04-29 from realized codebase state.

description: >
  Coverage of README, screenshots, VHS tapes, and documentation
  surfaces. Documents current state as a baseline for the
  docs_media assurance domain.

surfaces:
  readme:
    path: README.md
    related_paths:
      - docs/README.md
    sections:
      - overview
      - install
      - usage
      - contributing
    freshness_days: 30
    notes: >
      Top-level README at docs/README.md (generated by
      devtools render-docs-surface). Links to architecture,
      CLI reference, library API, MCP integration, providers.
      Root-level README.md updated by render-all. Not under
      automated freshness verification.

  cli_reference:
    path: docs/cli-reference.md
    freshness_days: 7
    generated_by: devtools render-cli-reference
    verified_by: devtools render-all --check
    notes: >
      docs/cli-reference.md generated from live Click help
      output. Verified as part of devtools verify and
      pre-commit hooks.

  architecture:
    path: docs/architecture.md
    freshness_days: 90
    generated_by: null
    verified_by: null
    notes: >
      docs/architecture.md describes system rings, ownership
      boundaries, data flow. Manually maintained.

  internals:
    path: docs/internals.md
    freshness_days: 30
    generated_by: null
    verified_by: null
    notes: >
      docs/internals.md is the working implementation reference.
      Manually maintained. Documents hot files, extension points,
      debugging landmarks.

  devtools_reference:
    path: docs/devtools.md
    freshness_days: 7
    generated_by: devtools render-devtools-reference
    verified_by: devtools render-all --check
    notes: >
      docs/devtools.md command catalog generated from
      devtools/command_catalog.py. Verified by render-all --check.

  quality_reference:
    path: docs/test-quality-workflows.md
    freshness_days: 7
    generated_by: devtools render-quality-reference
    verified_by: devtools render-all --check
    notes: >
      docs/test-quality-workflows.md from live validation,
      mutation, and benchmark registries. Generated.

  verification_catalog:
    path: docs/verification-catalog.md
    freshness_days: 7
    generated_by: devtools render-verification-catalog
    verified_by: devtools render-all --check
    notes: >
      docs/verification-catalog.md with proof subjects, claims,
      runners. Generated from proof registries.

  topology_status:
    path: docs/topology-status.md
    freshness_days: 7
    generated_by: devtools render-topology-status
    verified_by: devtools render-all --check
    notes: >
      docs/topology-status.md from topology projection and
      realized tree. Generated.

  screenshots:
    path: null
    count: 0
    notes: >
      No screenshots committed to the repository. The
      docs/screenshots/ directory does not exist.
      README demo uses .local/readme-demo/ with rendered
      conversation markdown files.

  vhs_tapes:
    path: null
    count: 0
    notes: >
      No VHS tapes are committed to the repository. Local README
      demo experiments may live under .local/readme-demo/, but
      .local is machine-local state and must not be required by
      manifest verification.

  provider_docs:
    path: docs/providers/
    providers:
      - chatgpt
      - claude-ai
      - claude-code
      - openai-codex
      - gemini
    freshness_days: 90
    notes: >
      Per-provider notes in docs/providers/. Provider README
      indexes all five. Manually maintained.

  configuration_docs:
    path: docs/configuration.md
    freshness_days: 90
    notes: >
      Documents XDG paths, environment variables, and runtime
      configuration. Manually maintained.

  data_model_docs:
    path: docs/data-model.md
    freshness_days: 90
    notes: >
      Documents archive entities, storage shape, metadata rules.
      Manually maintained.

  contributing_docs:
    path: CONTRIBUTING.md
    freshness_days: 90
    verified_by: devtools render-all --check
    notes: >
      Contributor workflow, branching, PRs, versioning policy.
      Root-level, manually maintained.

  testing_docs:
    path: TESTING.md
    freshness_days: 90
    notes: >
      Test suite layout, patterns, QA exercises, mutation testing
      policy. Root-level, manually maintained.

  agent_guide:
    path: CLAUDE.md
    freshness_days: 30
    generated_by: devtools render-agents
    verified_by: devtools render-all --check
    notes: >
      Agent memory and working rules. Generated from CLAUDE.md +
      included files. Renders AGENTS.md. Verified by render-all.

  release_docs:
    path: docs/release.md
    freshness_days: 180
    notes: >
      Release checklist, pre-flight checks, tagging procedure.
      Manually maintained. Updated on version bumps.

coverage_gaps:
  - id: docs-media.executable-examples
    domain: docs_media
    gap: README examples and media are not yet generated from executable scenario projections.
    owner: docs-media
    severity: major
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    issue: 590
    next_evidence: devtools render-docs-surface --check
  - id: docs-media.screenshot-integrity
    domain: docs_media
    gap: Screenshots and VHS media have no committed nonblank/readability verification.
    owner: docs-media
    severity: major
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    issue: 590
    next_evidence: devtools render-docs-surface --check
  - id: docs-media.site-publication-integrity
    domain: site_publication
    gap: Static-site publication has no visual or hyperlink integrity gate.
    owner: docs-media
    severity: major
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    issue: 590
    next_evidence: devtools render-docs-surface --check
