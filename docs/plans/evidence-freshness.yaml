# Evidence-freshness manifest.
#
# Transitional freshness manifest. Freshness should be derived from
# pytest/JUnit/json-report, coverage, benchmark, CI, and runtime evidence
# artifact timestamps/git SHAs under #594/#1065, not from hand-maintained claim
# rows in this file.

description: Transitional freshness inventory pending artifact-derived freshness.

freshness_policies:
  per_pr:
    description: "Evidence regenerated before creating a PR (devtools verify)"
    max_age_days: 7
    applies_to: [archive.query.provider_filter_consistency, provider.capability.identity_bridge, provider.capability.partial_coverage_declared]

  weekly:
    description: "Evidence regenerated weekly via scheduled CI or manual trigger"
    max_age_days: 14
    applies_to: [schema.values.value_closure, schema.foreign_key.resolves, artifact.path.dependency_closure]

  monthly:
    description: "Evidence regenerated monthly"
    max_age_days: 31
    applies_to: [maintenance.repair.crash_consistency, parser.quarantine.context_redaction]

  manual:
    description: "Evidence requires human review (manual_review oracle)"
    max_age_days: 90
    applies_to: [error.machine_user_context, trace.operation.surface_equivalence, diagnostic.observable_trace_mapping]

stale_threshold:
  behavior_evidence_days: 14
  smoke_evidence_days: 30
  manual_review_evidence_days: 90
