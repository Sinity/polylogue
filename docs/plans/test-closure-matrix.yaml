# Test-closure matrix.
#
# Per-domain matrix mapping production modules to the tests that exercise them,
# the verification gate the coverage is wired into, and any known gaps.
#
# Schema (one row per domain):
#   - domain: short stable identifier (dotted form encouraged, e.g. storage.blob_store)
#   - target_files: production module paths under polylogue/ that this domain owns.
#       Files must exist on disk. Directories (trailing /) are accepted and
#       mean "every Python file under this prefix".
#   - representative_tests: test files or pytest nodeids that exercise the
#       domain's behavior. File paths must exist on disk; nodeid form
#       (path::Class::test) is accepted and only the path component is checked.
#   - gate: how the coverage is reached.
#       required  — run in the default `devtools verify` baseline.
#       optional  — only run in lab / nightly / opt-in workflows; documented
#                   but not blocking on every PR.
#       absent    — known gap; representative_tests may be empty. A non-empty
#                   known_gaps list is mandatory for this gate.
#   - known_gaps: free-text bullets describing what is NOT covered for this
#       domain. Optional for required/optional rows, required for absent rows.
#
# The verifier (devtools verify-closure-matrix) checks that:
#   - every target_files entry exists,
#   - every representative_tests file exists (or, for a nodeid, the file half),
#   - every absent row carries at least one known_gaps bullet,
#   - every required/optional row lists at least one representative test.
#
# Authored 2026-05-17 for #1186. Successor to docs/plans/test-coverage-domains.yaml,
# which is now a deprecated qualitative catalog (see deprecated_pointer below).

description: >
  Four-column closure matrix mapping production domains to representative tests,
  the gate that runs them, and known gaps. Consumed by
  `devtools verify-closure-matrix` in the default verify baseline.

deprecated_pointer:
  legacy_manifest: docs/plans/test-coverage-domains.yaml
  status: superseded
  note: >
    test-coverage-domains.yaml is retained as a free-text qualitative catalog;
    the executable closure matrix lives here. New coverage entries should land
    in this file and only optionally cross-reference the older qualitative
    notes.

