# Scenario-coverage manifest.
#
# Declares verification scenario families and their subject coverage.
# Each family groups scenarios that verify a common surface or
# concern. Verification closure comes from executable scenarios and
# coverage gaps, not maturity self-declarations.
#
# Updated 2026-04-29 from realized codebase state.

description: >
  Scenario families and their subject coverage across Polylogue lab
  surfaces. Documents which surfaces have executable scenario specifications
  and which lack them.

families:
  - name: cli_surfaces
    description: CLI command surface checks
    subject: cli_surface
    scenario_count: dynamic
    location: polylogue/scenarios/cli_surfaces.py
    notes: >
      Generates CLI-surface checks and variants (live, memory
      budget) from CliSurfaceFamily definitions. Covers all CLI
      commands via help-output and exit-code assertions.

  - name: insight_surfaces
    description: Insight command surface checks
    subject: cli_surface
    scenario_count: dynamic
    location: polylogue/scenarios/insight_surfaces.py
    notes: >
      Covers insight commands (resume, insights) and their
      rendering contracts. Includes live and contract variants.

  - name: operational_surfaces
    description: Operational surface checks
    subject: operational_resilience
    scenario_count: dynamic
    location: polylogue/scenarios/operational_surfaces.py
    notes: >
      Covers maintenance operations, repair, check commands.
      Includes live and memory budget lanes.

  - name: corpus_scenarios
    description: Synthetic corpus scenario specs
    subject: provider_coverage
    scenario_count: dynamic
    location: polylogue/scenarios/corpus.py
    notes: >
      CorpusScenario subclass generates synthetic archives for
      all 5 providers. Configurable profiles, source kinds, and
      counts. Used by verification workspaces and pipeline probes.

  - name: executable_scenarios
    description: Named executable scenario wrappers
    subject: unclassified
    scenario_count: dynamic
    location: polylogue/scenarios/executable.py
    notes: >
      Minimal ExecutableScenario wraps a NamedScenarioSource
      into an executable form. Used as adapter for scenario
      dispatch.

  - name: assertion_scenarios
    description: Assertion specs for scenario verification
    subject: spec_accuracy
    scenario_count: dynamic
    location: polylogue/scenarios/assertions.py
    notes: >
      AssertionSpec types (exit-code, stdout-contains, etc.)
      for composing scenario verification predicates.

  - name: projection_scenarios
    description: Scenario-to-evidence projection specs
    subject: spec_completeness
    scenario_count: dynamic
    location: polylogue/scenarios/projections.py
    notes: >
      ScenarioProjectionSource maps scenarios to verification
      projections. Supports scenario-aware evidence reference
      rendering.

  - name: runtime_scenarios
    description: Scenario execution runtime
    subject: pipeline_correctness
    scenario_count: dynamic
    location: polylogue/scenarios/runtime.py
    notes: >
      Execution dispatch, runner invocation, and result handling
      for scenario execution. Supports pytest, CLI, devtools,
      and pipeline-probe execution kinds.

  - name: storage_correctness
    description: Archive-backed storage correctness scenario family
    subject: storage_correctness
    scenario_count: 4
    location: devtools/storage_correctness_scenario.py
    bead: polylogue-9e5.19
    notes: >
      Realized from the prior scenario.storage-correctness gap.
      Runs through the devtools lab smoke/lane registry against
      real ArchiveStore split-tier writes. Covers content-hash
      idempotency, canonical message FTS trigger drift and production
      recovery, lineage prefix-sharing composition, and current blob
      GC invariants. The old blob-lease wording was stale because no
      production writer populated it. This family instead covers
      publication/reference survival, gc_generations age/snapshot
      gating, and typed reclaim evidence.

coverage_gaps:
  - id: scenario.performance
    subject: performance
    gap: No scenario family exercising memory or throughput budgets
    owner: scenario-coverage
    severity: major
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    bead: polylogue-20d.16
    next_evidence: devtools lab projections
  - id: scenario.security-privacy
    subject: security_privacy
    gap: Security verification uses unit tests, not scenario specs
    owner: scenario-coverage
    severity: major
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    bead: polylogue-kwsb
    next_evidence: devtools lab projections
  - id: scenario.distribution
    subject: distribution
    gap: No scenario for install/package verification
    owner: scenario-coverage
    severity: major
    declared_at: "2026-05-02"
    review_after: "2026-08-01"
    bead: polylogue-3tl.7
    next_evidence: devtools lab projections
  - id: scenario.schema-rebuild-safety
