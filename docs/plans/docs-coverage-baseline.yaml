# Docs-coverage baseline (polylogue-3tl.9)
#
# Pre-existing public surfaces (CLI commands, MCP tools, config keys, stable
# daemon routes) with no doc-tree mention as of the introduction of
# `devtools verify docs-coverage`. This is TRACKED DEBT, not an allowlist to
# extend: new surfaces must be documented, not added here. Remove an entry
# once the surface is documented anywhere in README.md or docs/**/*.md -- the
# lint reports stale baseline entries so this stays honest.
#
# Schema: gaps.<surface> is a list of {name, reason} entries. Surfaces:
# cli (command display name), mcp (tool name), config (flat config key),
# route (daemon HTTP route pattern).
#
# Follow-up: polylogue-ccma (full claim-by-claim docs sweep) and future docs
# passes should retire entries here rather than leaving the baseline static.

