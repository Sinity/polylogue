# Soft-mode lint escalation manifest.
# Each rule declares its current severity and the date it escalates to
# hard enforcement. After the sunset date, soft-mode becomes an error.
#
# Pattern: add a rule when a lint is first introduced in soft/warning mode.
# The sunset clock ensures it doesn't stay soft forever.
#
# Dates are quoted strings to avoid YAML date-parsing ambiguity.

description: Lint escalation registry with sunset clocks — soft warnings become hard errors on expiry.

rules:
  - id: verify-topology
    description: Topology projection matches realized tree
    severity: hard
    sunset: "2026-04-26"

  - id: verify-cluster-cohesion
    description: Import graph respects cluster boundaries
    severity: hard
    sunset: "2026-04-26"

  - id: verify-file-budgets
    description: Per-file LOC budgets enforced
    severity: hard
    sunset: "2026-04-26"

  - id: verify-test-ownership
    description: Every production module imported by at least one unit test
    severity: hard
    sunset: "2026-04-26"

  - id: verify-manifests
    description: Internal consistency across all docs/plans/*.yaml manifests
    severity: soft
    sunset: "2026-05-15"

  - id: suppression-expiry
    description: No expired suppressions in docs/plans/suppressions.yaml
    severity: soft
    sunset: "2026-05-27"

  - id: oracle-attribution
    description: Every claim has a non-default oracle and assurance_domain
    severity: soft
    sunset: "2026-06-01"
