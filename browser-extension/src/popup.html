<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Polylogue Capture</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172026;
        --muted: #5f6b76;
        --line: #d7dde2;
        --surface: #ffffff;
        --panel: #f4f7f9;
        --ok: #14764e;
        --warn: #9a5b00;
        --bad: #ad2f2f;
        --accent: #325d8f;
        --focus: #0f6cbd;
        --gpt: #10a37f;
        --claude: #d97745;
        --grok: #111827;
      }
      * {
        box-sizing: border-box;
      }
      body {
        width: 620px;
        min-width: 480px;
        max-width: 680px;
        margin: 0;
        color: var(--ink);
        background: var(--surface);
        font: 15px/1.45 system-ui, sans-serif;
      }
      main {
        padding: 18px;
      }
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--line);
      }
      h1 {
        margin: 0;
        font-size: 19px;
        letter-spacing: 0;
      }
      .brand {
        display: flex;
        align-items: center;
        gap: 9px;
      }
      .mark {
        display: grid;
        place-items: center;
        width: 30px;
        height: 30px;
        flex: 0 0 auto;
        border-radius: 7px;
        color: #fff;
        background: var(--accent);
        font-weight: 700;
      }
      .subtitle {
        color: var(--muted);
        font-size: 13px;
      }
      .badge {
        min-width: 86px;
        padding: 6px 10px;
        border-radius: 999px;
        color: #fff;
        text-align: center;
        font-size: 13px;
        font-weight: 650;
        background: var(--muted);
      }
      .badge.ok { background: var(--ok); }
      .badge.warn { background: var(--warn); }
      .badge.bad { background: var(--bad); }
      .provider-chip {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        justify-content: flex-end;
      }
      .provider-logo {
        display: inline-grid;
        place-items: center;
        min-width: 24px;
        height: 26px;
        padding: 0 6px;
        border-radius: 6px;
        color: #fff;
        font-size: 12px;
        font-weight: 700;
      }
      .provider-logo.chatgpt { background: var(--gpt); }
      .provider-logo.claude-ai { background: var(--claude); }
      .provider-logo.grok { background: var(--grok); }
      .provider-logo.unknown { background: var(--muted); }
      section {
        padding: 14px 0;
        border-bottom: 1px solid var(--line);
      }
      section:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }
      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin: 8px 0;
      }
      .label {
        color: var(--muted);
      }
      .value {
        max-width: 330px;
        overflow: hidden;
        text-align: right;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .controls {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }
      button {
        position: relative;
        width: 100%;
        min-height: 42px;
        padding: 9px 12px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--ink);
        background: var(--panel);
        font: inherit;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, box-shadow 120ms ease, transform 80ms ease;
      }
      button:hover {
        border-color: var(--accent);
        background: #eaf1f8;
      }
      button:focus-visible {
        outline: 3px solid color-mix(in srgb, var(--focus), transparent 70%);
        outline-offset: 2px;
      }
      button:active {
        transform: translateY(1px);
      }
      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }
      button.primary {
        border-color: var(--accent);
        color: #fff;
        background: var(--accent);
      }
      button.primary:hover {
        background: #264f7d;
      }
      button[data-state="ok"] {
        border-color: var(--ok);
        box-shadow: inset 0 -3px 0 var(--ok);
      }
      button[data-state="bad"] {
        border-color: var(--bad);
        box-shadow: inset 0 -3px 0 var(--bad);
      }
      .button-label,
      .button-status {
        display: block;
      }
      .button-status {
        min-height: 15px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.1;
      }
      button.primary .button-status {
        color: #d8e6f2;
      }
      input {
        width: 100%;
        min-height: 40px;
        padding: 8px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
      }
      .setting-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 96px;
        gap: 10px;
        margin-top: 8px;
      }
      #state {
        min-height: 28px;
        margin: 0;
        color: var(--ink);
        font-weight: 650;
        white-space: pre-wrap;
      }
      #state-detail {
        min-height: 42px;
        margin: 6px 0 12px;
        color: var(--muted);
      }
      .log {
        display: grid;
        gap: 8px;
        max-height: 180px;
        overflow: auto;
        padding-right: 2px;
      }
      .log-item {
        display: grid;
        grid-template-columns: 54px minmax(0, 1fr);
        gap: 10px;
        padding: 8px 0;
        border-top: 1px solid var(--line);
      }
      .log-time {
        color: var(--muted);
        font-size: 12px;
      }
      .log-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .log-meta {
        color: var(--muted);
        font-size: 12px;
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin-bottom: 8px;
      }
      .link-button {
        width: auto;
        min-height: 34px;
        padding: 5px 9px;
      }
      #debug-panel[hidden] {
        display: none;
      }
      .debug-actions {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 140px;
        gap: 10px;
        margin-bottom: 10px;
      }
      @media (max-width: 460px) {
        body {
          width: 100vw;
          min-width: 360px;
        }
        .controls {
          grid-template-columns: 1fr;
        }
        .value {
          max-width: 210px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div class="brand">
          <div class="mark">P</div>
          <div>
            <h1>Polylogue Capture</h1>
            <div class="subtitle">ChatGPT, Claude.ai, Grok</div>
          </div>
        </div>
        <div id="badge" class="badge">checking</div>
      </header>

      <section>
        <div class="row"><span class="label">Page</span><span id="page" class="value provider-chip">Unknown</span></div>
        <div class="row"><span class="label">Receiver</span><span id="receiver" class="value">127.0.0.1:8765</span></div>
        <div class="row"><span class="label">Archive</span><span id="archive" class="value">Not checked</span></div>
        <div class="row"><span class="label">Mode</span><span id="mode" class="value">--</span></div>
        <div class="row"><span class="label">Turns</span><span id="turns" class="value">--</span></div>
        <div class="row"><span class="label">Request</span><span id="receiver-request" class="value">--</span></div>
        <div class="row"><span class="label">Updated</span><span id="updated" class="value">--</span></div>
      </section>

      <section>
        <p id="state">Checking receiver...</p>
        <p id="state-detail"></p>
        <div class="controls">
          <button id="capture" class="primary"><span class="button-label">Capture page</span><span class="button-status"></span></button>
          <button id="check"><span class="button-label">Check status</span><span class="button-status"></span></button>
          <button id="sync-open-tabs"><span class="button-label">Sync open tabs</span><span class="button-status"></span></button>
          <button id="copy-ref"><span class="button-label">Copy ref</span><span class="button-status"></span></button>
          <button id="open-polylogue"><span class="button-label">Open in Polylogue</span><span class="button-status"></span></button>
        </div>
      </section>

      <section>
        <div class="section-head">
          <span class="label">Recent log</span>
          <span id="log-count" class="value">0</span>
        </div>
        <div id="log" class="log"></div>
      </section>

      <section>
        <div class="section-head">
          <span class="label">Debug log</span>
          <span id="debug-count" class="value">0</span>
        </div>
        <div class="debug-actions">
          <button id="debug-toggle" class="link-button"><span class="button-label">Show details</span><span class="button-status"></span></button>
          <button id="debug-export" class="link-button"><span class="button-label">Export JSON</span><span class="button-status"></span></button>
        </div>
        <div id="debug-panel" hidden>
          <div id="debug-log" class="log"></div>
        </div>
      </section>

      <section>
        <label class="label" for="receiver-url">Local receiver URL</label>
        <div class="setting-row">
          <input id="receiver-url" value="http://127.0.0.1:8765">
          <button id="save"><span class="button-label">Save</span><span class="button-status"></span></button>
        </div>
        <label class="label" for="receiver-token">Bearer token (optional)</label>
        <input id="receiver-token" type="password" autocomplete="off" placeholder="Only needed when receiver auth is enabled">
      </section>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
