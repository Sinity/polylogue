schema: polylogue-sinex-legibility-mission-plan/v2
generated_at: '2026-07-10T00:00:00Z'
policy:
  planning_authority: Beads remain authoritative; this file is an executable launch cut, not a replacement roadmap.
  merge_policy: Optimize for validated product state, not elegant branch history.
  claim_policy: No public copy before executable proof and independent oracle exist.
  ownership_policy: One active writer per overlapping write-path root.
  integration_policy: Only coordinator-owned integration missions run full verification or publish artifacts.
resource_capacities:
  poly-python-light:
    capacity: 4
    reason: Docs, focused tests, small Python changes.
  poly-python-heavy:
    capacity: 2
    reason: Archive generation, broad tests, renderers, and data migrations.
  sinex-rust-heavy:
    capacity: 1
    reason: Cargo builds and large Rust link steps contend for RAM and disk.
  postgres-nats-stack:
    capacity: 1
    reason: One isolated live Sinex proof stack on a single machine.
  browser-vhs:
    capacity: 1
    reason: Browser/terminal recording uses shared display and ports.
  full-verification:
    capacity: 1
    reason: Only the integrator runs broad release gates.
  integration-worktree:
    capacity: 1
    reason: One authority merges and publishes evidence.
  docs-static:
    capacity: 6
    reason: Mostly CPU-light and low-conflict when ownership is bounded.
horizons:
  72h:
    goal: A cold reader can install Polylogue, run one trustworthy proof, and understand its non-claims.
  7d:
    goal: The public arc includes semantic receipts, real-field evidence, lineage accounting, and visible degradation.
  30d:
    goal: The joint system proves coverage-aware cross-domain evidence and transcript-complete Sinex-backed rebuild.
