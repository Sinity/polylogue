<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Cold-reader test runner</title><style>:root{color-scheme:dark;--bg:#07101d;--panel:#111c2e;--line:#2b3c59;--text:#f5f7fb;--muted:#aab6c7;--blue:#6ca9ff;--green:#55d8ac}*{box-sizing:border-box}body{margin:0;background:var(--bg);font-family:Inter,system-ui,sans-serif;color:var(--text)}main{max-width:1200px;margin:auto;padding:36px 24px 80px}h1{font-size:38px}section{border:1px solid var(--line);background:var(--panel);border-radius:16px;padding:22px;margin:18px 0}.row{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}label{display:grid;gap:7px;color:var(--muted);font-size:14px}input,select,textarea{width:100%;background:#081321;color:var(--text);border:1px solid var(--line);border-radius:9px;padding:11px;font:inherit}textarea{min-height:88px}button{border:1px solid var(--line);background:#183760;color:white;border-radius:9px;padding:11px 16px;font-weight:800;cursor:pointer;margin:4px}.danger{background:#552c36}.secondary{background:#172235}.preview{background:white;border-radius:12px;overflow:auto;text-align:center}.preview img{max-width:100%;display:block;margin:auto}.hidden{display:none}.timer{font:700 26px ui-monospace,monospace;color:var(--green)}.scores{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px}.note{color:var(--muted);line-height:1.55}code{background:#081321;padding:.15em .4em;border-radius:5px}</style></head><body><main><h1>Cold-reader test runner</h1><p class="note">Randomize an arm, expose it for the chosen duration, hide it, capture unaided answers, then re-show for first-action and boundary questions. Sessions remain in this browser until exported.</p>
<section><div class="row"><label>Participant ID<input id="participant" placeholder="P-001"></label><label>Project<select id="project"><option value="sinex">Sinex</option><option value="polylogue">Polylogue</option></select></label><label>Exposure seconds<input id="duration" type="number" min="10" value="45"></label><label>Optional fixed arm<select id="fixed"><option value="">Random</option></select></label></div><p><button id="start">Start randomized exposure</button><button id="show" class="secondary">Show selected</button><button id="hide" class="danger">Hide now</button></p><div class="timer" id="timer">Not started</div><div id="armLabel" class="note"></div></section>
<section id="previewWrap" class="preview hidden"><img id="preview" alt="README first fold"></section>
<section><h2>Unaided answers</h2><div class="row"><label>What kind of thing is this?<textarea id="category"></textarea></label><label>What problem does it solve?<textarea id="outcome"></textarea></label><label>Most distinctive behavior remembered<textarea id="differentiator"></textarea></label><label>What does the visible proof establish?<textarea id="proof"></textarea></label><label>What does it not establish?<textarea id="boundary"></textarea></label><label>What felt unclear or unbelievable?<textarea id="confusion"></textarea></label></div></section>
<section><h2>After re-showing</h2><div class="row"><label>First action / command<textarea id="action"></textarea></label><label>Material false beliefs<textarea id="falseBeliefs" placeholder="One per line"></textarea></label><label>Verbatim project-specific answer<textarea id="projectProbe"></textarea></label></div></section>
<section><h2>Independent scoring</h2><div class="scores"><label>Category 0–2<input id="sCategory" type="number" min="0" max="2"></label><label>Outcome 0–2<input id="sOutcome" type="number" min="0" max="2"></label><label>Differentiator 0–2<input id="sDiff" type="number" min="0" max="2"></label><label>First action 0–2<input id="sAction" type="number" min="0" max="2"></label><label>Boundary 0–2<input id="sBoundary" type="number" min="0" max="2"></label><label>False beliefs 0–3<input id="sFalse" type="number" min="0" max="3"></label><label>Confidence 1–5<input id="confidence" type="number" min="1" max="5"></label></div><p><button id="save">Save session</button><button id="exportJson" class="secondary">Export JSON</button><button id="exportCsv" class="secondary">Export CSV</button><button id="clear" class="danger">Clear local sessions</button></p><p id="saved" class="note"></p></section>
<script>
const arms={sinex:[['current','../prototypes/screenshots/sinex-current.png'],['recall-first','../prototypes/screenshots/sinex-recall-first.png'],['rebuildable-first','../prototypes/screenshots/sinex-rebuildable-first.png']],polylogue:[['current','../prototypes/screenshots/polylogue-current.png'],['receipts-first','../prototypes/screenshots/polylogue-receipts-first.png'],['search-first','../prototypes/screenshots/polylogue-search-first.png']]};let selected=null,startAt=null,timerId=null,order=0;const $=id=>document.getElementById(id);function fill(){const p=$('project').value;$('fixed').innerHTML='<option value="">Random</option>'+arms[p].map(x=>`<option value="${x[0]}">${x[0]}</option>`).join('')}$('project').onchange=fill;fill();function choose(){const p=$('project').value,f=$('fixed').value;selected=f?arms[p].find(x=>x[0]===f):arms[p][Math.floor(Math.random()*arms[p].length)];$('preview').src=selected[1];$('armLabel').textContent=`Assigned arm: ${selected[0]}`;return selected}function show(){if(!selected)choose();$('previewWrap').classList.remove('hidden')}function hide(){$('previewWrap').classList.add('hidden');if(timerId)clearInterval(timerId)}$('show').onclick=show;$('hide').onclick=hide;$('start').onclick=()=>{choose();show();startAt=performance.now();order++;const dur=Number($('duration').value)||45;timerId=setInterval(()=>{const left=Math.max(0,dur-(performance.now()-startAt)/1000);$('timer').textContent=`${left.toFixed(1)} s`;if(left<=0){hide();$('timer').textContent='Exposure complete'}},100)};function sessions(){return JSON.parse(localStorage.getItem('fi-reader-sessions')||'[]')}function val(id){return $(id).value.trim()}$('save').onclick=()=>{if(!selected)choose();const row={schema_version:1,saved_at:new Date().toISOString(),participant:val('participant'),project:$('project').value,arm:selected[0],order,exposure_seconds:Number($('duration').value),category:val('category'),outcome:val('outcome'),differentiator:val('differentiator'),proof:val('proof'),boundary:val('boundary'),confusion:val('confusion'),first_action:val('action'),false_beliefs:val('falseBeliefs'),project_probe:val('projectProbe'),scores:{category:Number(val('sCategory')),outcome:Number(val('sOutcome')),differentiator:Number(val('sDiff')),first_action:Number(val('sAction')),boundary:Number(val('sBoundary')),false_beliefs:Number(val('sFalse')),confidence:Number(val('confidence'))}};const s=sessions();s.push(row);localStorage.setItem('fi-reader-sessions',JSON.stringify(s));$('saved').textContent=`Saved ${s.length} session(s) locally.`};function download(name,text,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([text],{type}));a.download=name;a.click();URL.revokeObjectURL(a.href)}$('exportJson').onclick=()=>download('first-impression-reader-sessions.json',JSON.stringify(sessions(),null,2),'application/json');$('exportCsv').onclick=()=>{const s=sessions(),cols=['saved_at','participant','project','arm','order','exposure_seconds','category','outcome','differentiator','proof','boundary','confusion','first_action','false_beliefs','project_probe','score_category','score_outcome','score_differentiator','score_first_action','score_boundary','score_false_beliefs','confidence'];const q=x=>'"'+String(x??'').replaceAll('"','""')+'"';const rows=[cols.join(',')].concat(s.map(r=>[r.saved_at,r.participant,r.project,r.arm,r.order,r.exposure_seconds,r.category,r.outcome,r.differentiator,r.proof,r.boundary,r.confusion,r.first_action,r.false_beliefs,r.project_probe,r.scores.category,r.scores.outcome,r.scores.differentiator,r.scores.first_action,r.scores.boundary,r.scores.false_beliefs,r.scores.confidence].map(q).join(',')));download('first-impression-reader-sessions.csv',rows.join('\n'),'text/csv')};$('clear').onclick=()=>{if(confirm('Delete all locally saved sessions?')){localStorage.removeItem('fi-reader-sessions');$('saved').textContent='Local sessions cleared.'}};$('saved').textContent=`${sessions().length} saved session(s) in this browser.`;
</script></body></html>
