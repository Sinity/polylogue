<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>README composition playground</title>
<style>:root{color-scheme:dark;--bg:#07101d;--panel:#101c2f;--line:#2a3b58;--text:#f6f8fc;--muted:#aeb9ca;--blue:#70abff;--green:#59d8ae;--amber:#f3c66e}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:Inter,system-ui,sans-serif}.shell{display:grid;grid-template-columns:330px 1fr;min-height:100vh}.side{border-right:1px solid var(--line);padding:28px 22px;background:#0a1423;position:sticky;top:0;height:100vh;overflow:auto}.main{padding:34px;min-width:0}h1{font-size:27px;margin:0 0 8px}.hint{color:var(--muted);line-height:1.5}.project{display:flex;gap:8px;margin:26px 0}.project button,.variant{border:1px solid var(--line);background:#111d30;color:var(--text);border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:700}.project button.active,.variant.active{background:#18345e;border-color:#4e83c9}.variants{display:grid;gap:8px}.variant{text-align:left}.stage{max-width:1440px;margin:auto}.stage img{width:100%;display:block;border-radius:15px;box-shadow:0 30px 80px #0009}.info{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:22px}.box{border:1px solid var(--line);background:var(--panel);border-radius:14px;padding:20px}.box h2{font-size:18px;margin:0 0 10px}.box p,.box li{color:var(--muted);line-height:1.55}.pill{display:inline-block;border:1px solid var(--line);border-radius:999px;padding:5px 9px;margin-right:6px;color:var(--green);font-size:12px;font-weight:800}.pill.gated{color:var(--amber)}a{color:var(--blue)}@media(max-width:900px){.shell{display:block}.side{height:auto;position:static;border-right:0;border-bottom:1px solid var(--line)}.info{grid-template-columns:1fr}}</style></head><body><div class="shell"><aside class="side"><h1>Composition playground</h1><p class="hint">Pick a narrative. The variants are independent hypotheses, not progressively “better” skins.</p><div class="project"><button id="sinexBtn" class="active">Sinex</button><button id="polyBtn">Polylogue</button></div><div id="variants" class="variants"></div><p class="hint" style="margin-top:24px">Open the generated Markdown from the details panel. Prototype labels remain load-bearing until product-generated media passes.</p></aside><main class="main"><div class="stage"><img id="preview" alt="Selected first-fold prototype"><div class="info"><section class="box"><div id="pills"></div><h2 id="title"></h2><p id="why"></p><p><a id="readme" href="#">Open generated README</a></p></section><section class="box"><h2>Promotion gate</h2><p id="gate"></p><h2>Primary risk</h2><p id="risk"></p></section></div></div></main></div>
<script>
const data={sinex:[
{id:'current',label:'Current control',img:'screenshots/sinex-current.png',title:'Architecture-first control',why:'Tests how much value the present category line and architecture can transmit without a concrete experience.',gate:'Control only; no promotion decision.',risk:'Readers understand the stack but cannot state the practical first action.',readme:'../snapshots/sinex.README.current.md',pills:['CONTROL']},
{id:'recall',label:'Recall-first',img:'screenshots/sinex-recall-first.png',title:'Ask your machine what you were doing.',why:'Uses the shipped recall command as the shortest bridge from event substrate to a recognizable human problem.',gate:'Public generated receipt or explicit prototype boundary; clean route; cold-reader win/tie.',risk:'A polished mockup can be mistaken for public evidence.',readme:'../generated/README.sinex.recall-first.md',pills:['RECOMMENDED','PROTOTYPE']},
{id:'rebuildable',label:'Rebuildable-first',img:'screenshots/sinex-rebuildable-first.png',title:'Your data should not be interpreted only once.',why:'Teaches the deepest conceptual model: stable source evidence and replayable versioned interpretations.',gate:'Readers correctly separate source from interpretation and do not infer Nix compatibility or automatic truth.',risk:'Elegant abstraction can obscure the first concrete use.',readme:'../generated/README.sinex.rebuildable-first.md',pills:['CONCEPT ARM','PROTOTYPE']},
{id:'replay',label:'Replay-first',img:'screenshots/sinex-replay-first.png',title:'Capture once. Rebuild understanding later.',why:'Best technical differentiation for event-sourcing and data-infrastructure readers.',gate:'Generated replay receipt retains both interpretations, source identity, negative control, and effect decision.',risk:'Replay semantics feel remote before readers care about machine history.',readme:'../generated/README.sinex.replay-first.md',pills:['TECHNICAL','PROTOTYPE']},
{id:'target',label:'Target public receipt',img:'screenshots/sinex-target-multisource.png',title:'Deterministic public analog',why:'Specifies the desired publication artifact without pretending a new recall engine is needed.',gate:'Implement fixed source-shaped scenario, falsifiers, privacy scan, normalized payload, and freshness owner.',risk:'Target copy can leak into public claims before the fixture ships.',readme:'../library/sinex/target-publication.md',pills:['TARGET','GATED']},
{id:'spine',label:'Event-spine',img:'screenshots/sinex-event-spine.png',title:'The event spine for a local machine.',why:'Conservative contributor positioning that keeps the runtime and invariants dominant.',gate:'Use only when the audience already understands why a local event spine matters.',risk:'Implementation arrives before the payoff.',readme:'../generated/README.sinex.event-spine.md',pills:['CONTRIBUTOR ARM']}
],polylogue:[
{id:'current',label:'Current control',img:'screenshots/polylogue-current.png',title:'Substantial but crowded',why:'Tests the current combination of badges, provider breadth, five jobs, raw visual, and install-first action.',gate:'Control only.',risk:'The receipt competes with the complete product map.',readme:'../snapshots/polylogue.README.current.md',pills:['CONTROL']},
{id:'receipts',label:'Receipts-first',img:'screenshots/polylogue-receipts-first.png',title:'Know what the agents actually did.',why:'Makes the deterministic claim boundary, later repair, and anti-grep control the remembered event.',gate:'Generated visual freshness, measured clean route, and no prevalence inference.',risk:'Prototype media can look more authoritative than its owner.',readme:'../generated/README.polylogue.receipts-first.md',pills:['RECOMMENDED','PROTOTYPE']},
{id:'search',label:'Search-first',img:'screenshots/polylogue-search-first.png',title:'Search every AI-work history as one archive.',why:'Reaches a useful action fastest and matches archive-discovery intent.',gate:'Cold readers must still mention structural outcomes, evidence refs, or lineage unaided.',risk:'Category collapses to chat search.',readme:'../generated/README.polylogue.search-first.md',pills:['FAST ACTION']},
{id:'continuity',label:'Continuity-first',img:'screenshots/polylogue-continuity-first.png',title:'Give the next agent evidence, not a summary.',why:'A focused agent-handoff story built from bounded context, omissions, caveats, and reviewed judgment.',gate:'Keep to capability language until a paired resumption experiment reports.',risk:'Readers infer measured downstream improvement.',readme:'../generated/README.polylogue.continuity-first.md',pills:['FOCUSED','CAPABILITY-SAFE']}
]};
let project='sinex',selected='recall';const q=x=>document.querySelector(x);function render(){q('#sinexBtn').classList.toggle('active',project==='sinex');q('#polyBtn').classList.toggle('active',project==='polylogue');const v=data[project];q('#variants').innerHTML=v.map(x=>`<button class="variant ${x.id===selected?'active':''}" data-id="${x.id}">${x.label}</button>`).join('');document.querySelectorAll('.variant').forEach(b=>b.onclick=()=>{selected=b.dataset.id;render()});const x=v.find(x=>x.id===selected)||v[0];q('#preview').src=x.img;q('#title').textContent=x.title;q('#why').textContent=x.why;q('#gate').textContent=x.gate;q('#risk').textContent=x.risk;q('#readme').href=x.readme;q('#pills').innerHTML=x.pills.map(p=>`<span class="pill ${/target|gated|prototype/i.test(p)?'gated':''}">${p}</span>`).join('')}
q('#sinexBtn').onclick=()=>{project='sinex';selected='recall';render()};q('#polyBtn').onclick=()=>{project='polylogue';selected='receipts';render()};render();
</script></body></html>
