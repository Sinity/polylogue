changelog:
  categories:
    - title: Features
      labels:
        - type:feat
    - title: Bug Fixes
      labels:
        - type:fix
    - title: Performance
      labels:
        - type:perf
    - title: Architecture
      labels:
        - type:refactor
    - title: Testing
      labels:
        - type:test
    - title: Documentation
      labels:
        - type:docs
    - title: Maintenance
      labels:
        - type:chore
    - title: Other
      labels:
        - "*"
