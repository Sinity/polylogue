name: Release Please

# Watches conventional-commit subjects on `master` and maintains a single
# open release PR that bumps `pyproject.toml`, updates `CHANGELOG.md`, and
# tags `vX.Y.Z` on merge. The downstream `release.yml` workflow handles
# the actual PyPI + GHCR publish on the resulting tag push.
#
# See docs/release.md for the operator-facing flow.

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-please:
    name: release-please
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}
