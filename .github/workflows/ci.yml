name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run devtools render agents --input CLAUDE.md --output "${RUNNER_TEMP}/AGENTS.md"
      - run: uv run devtools render all --check --skip agents
      - run: uv run ruff check polylogue/ tests/ devtools/
      - run: uv run ruff format --check polylogue/ tests/ devtools/

  test:
    # The full non-integration suite runs single-process under coverage
    # instrumentation across three Python versions; 45 min was on the edge and
    # legs were being cut mid-run (reported as "cancelled"), so the test gate
    # could never go green. 90 min gives headroom; passing runs cost their
    # actual ~45-50 min regardless of the ceiling.
    #
    # This heavy gate is intentionally OFF the per-PR path (operator decision):
    # the ~18 min wait on every PR was not worth it. It still runs post-merge on
    # master (regression net) and on demand via workflow_dispatch, but no longer
    # gates PRs. PRs keep the fast signal — lint, typecheck (mypy --strict), nix,
    # demo-visual-verify, distribution — plus the local pre-push
    # `devtools verify --quick` hook. Re-enable PR gating by deleting this `if:`.
    if: github.event_name != 'pull_request'
    timeout-minutes: 90
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - run: uv run devtools verify coverage
        env:
          POLYLOGUE_FORCE_PLAIN: "1"
          HYPOTHESIS_PROFILE: ci
      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.13'
        with:
          name: coverage-report
          path: coverage.xml

  typecheck:
    # Strict mypy over the clean subset of polylogue/*. The list of
    # legacy-dirty files is maintained in `pyproject.toml` under
    # `[tool.mypy] exclude` — shrinking that list is the mechanism for
    # widening coverage over time (issue #188).
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run mypy polylogue/

  demo-visual-verify:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run pytest -q tests/unit/cli/test_demo_command.py tests/unit/demo/test_demo_seed_verify.py tests/visual
        env:
          POLYLOGUE_FORCE_PLAIN: "1"

  distribution:
    # Build wheel + sdist from the checkout, rebuild a wheel from the unpacked
    # sdist, install each into fresh venvs, and smoke the runtime entrypoints
    # (polylogue / polylogued / polylogue-mcp). Closes the distribution.wheel-ci
    # and distribution.sdist-ci gaps tracked under #593 / #953.
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run devtools release verify-distribution --work-dir "${RUNNER_TEMP}/dist" --keep-work-dir
        env:
          POLYLOGUE_FORCE_PLAIN: "1"
      - uses: actions/upload-artifact@v7
        with:
          name: distribution-artifacts
          path: ${{ runner.temp }}/dist/dist/*
