name: CI

on:
  workflow_dispatch:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run python -m devtools render-agents --input CLAUDE.md --output "${RUNNER_TEMP}/AGENTS.md"
      - run: uv run python -m devtools render-all --check --skip agents
      - run: uv run ruff check polylogue/ tests/ devtools/
      - run: uv run ruff format --check polylogue/ tests/ devtools/

  test:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - run: uv run pytest --cov=polylogue --cov-report=xml --cov-fail-under=90 -q
        env:
          POLYLOGUE_FORCE_PLAIN: "1"
          HYPOTHESIS_PROFILE: ci
      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.13'
        with:
          name: coverage-report
          path: coverage.xml

  typecheck:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run mypy --strict polylogue/

  showcase-verify:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run python -m devtools verify-showcase
        env:
          POLYLOGUE_FORCE_PLAIN: "1"
