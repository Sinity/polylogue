name: CI

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run devtools render-agents --input CLAUDE.md --output "${RUNNER_TEMP}/AGENTS.md"
      - run: uv run devtools render-all --check --skip agents
      - run: uv run ruff check polylogue/ tests/ devtools/
      - run: uv run ruff format --check polylogue/ tests/ devtools/

  test:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --extra dev --frozen
      - run: uv run devtools coverage-gate
        env:
          POLYLOGUE_FORCE_PLAIN: "1"
          HYPOTHESIS_PROFILE: ci
      - uses: actions/upload-artifact@v7
        if: matrix.python-version == '3.13'
        with:
          name: coverage-report
          path: coverage.xml

  typecheck:
    # Strict mypy over the clean subset of polylogue/*. The list of
    # legacy-dirty files is maintained in `pyproject.toml` under
    # `[tool.mypy] exclude` — shrinking that list is the mechanism for
    # widening coverage over time (issue #188).
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run mypy polylogue/

  showcase-verify:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - run: uv run devtools lab-scenario verify-baselines
        env:
          POLYLOGUE_FORCE_PLAIN: "1"
