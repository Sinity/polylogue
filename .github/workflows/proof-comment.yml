name: Proof Comment

on:
  pull_request:
    branches: [master]
    types: [opened, reopened, synchronize, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  proof-pack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: "3.13"
      - run: uv sync --extra dev --frozen
      - name: Build proof-pack markdown
        run: |
          git fetch origin "${{ github.base_ref }}" --depth=1
          uv run devtools proof-pack \
            --base-ref "origin/${{ github.base_ref }}" \
            --head-ref HEAD \
            --markdown > "${RUNNER_TEMP}/proof-pack.md"
      - name: Post sticky proof-pack comment
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- polylogue-proof-pack -->";
            const body = `${marker}\n${fs.readFileSync(process.env.RUNNER_TEMP + "/proof-pack.md", "utf8")}`;
            const {owner, repo} = context.repo;
            const issue_number = context.payload.pull_request.number;
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            });
            const previous = comments.find(comment => comment.body && comment.body.includes(marker));
            if (previous) {
              await github.rest.issues.updateComment({owner, repo, comment_id: previous.id, body});
            } else {
              await github.rest.issues.createComment({owner, repo, issue_number, body});
            }
